# =============================================================================
# Release build — cross-build the PRODUCTION binary and attach it to the
# GitHub Release, run INSIDE the repo devcontainer (same env as CI / CLAUDE.md).
#
# Triggered when a Release is published (release-please cuts these, U4) and also
# on a pushed `v*` tag as a fallback. The asset is named
#   sst_cam_firmware-<tag>-aarch64
# which deploy/install.sh (U3) resolves by suffix.
#
# KNOWN RISK (same as ci.yml): a GitHub-hosted runner may not have the disk/time
# to unpack the ~37 GB L4T sysroot — a self-hosted runner may be required. To be
# validated on the first tagged run.
# =============================================================================
name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write # upload Release assets

jobs:
  build-and-upload:
    name: cross-build release binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with proto submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Resolve tag name
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Building release for tag: ${tag}"

      - name: cmake release preset + build
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
          push: never
          runCmd: |
            set -euo pipefail
            cmake --preset release
            cmake --build --preset release
            # Sanity: confirm the produced binary is aarch64 ELF.
            file build/release/bin/sst_cam_firmware
            test -x build/release/bin/sst_cam_firmware

      - name: Stage versioned asset
        id: asset
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          asset="sst_cam_firmware-${tag}-aarch64"
          cp build/release/bin/sst_cam_firmware "${asset}"
          echo "path=${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true
