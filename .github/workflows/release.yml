# =============================================================================
# Auto-release on merge to main. A conventional-commit scan since the last tag
# decides the bump (feat -> minor, fix/perf -> patch, BREAKING -> major) and
# SKIPS when only docs/chore/ci/test/refactor landed. On a real release it then
# cross-builds the production binary and attaches it to the Release.
# workflow_dispatch is a manual override.
#
# Default GITHUB_TOKEN only (contents:write); the "Release Tags" ruleset allows
# creating compliant semver tags, so no PAT/App is needed.
#
# KNOWN RISK (same as ci.yml): the JetPack devcontainer build is heavy and can
# be flaky on hosted runners (disk/image-pull). A self-hosted runner is the
# durable fix; re-run on a transient failure.
# =============================================================================
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version tag eg v1.2.3 (overrides auto-detect)"
        required: false
        default: ""
      bump:
        description: "Force bump level (overrides auto-detect)"
        type: choice
        options: ["", patch, minor, major]
        default: ""

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.ver.outputs.released }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version (conventional-commit aware)
        id: ver
        env:
          IN_VERSION: ${{ inputs.version }}
          IN_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v*' --sort=-v:refname | head -1)"; latest="${latest:-v0.0.0}"
          ver="${latest#v}"; MA="${ver%%.*}"; rest="${ver#*.}"; MI="${rest%%.*}"; PA="${rest##*.}"

          if [ -n "${IN_VERSION:-}" ]; then
            echo "$IN_VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' || { echo "::error::invalid version '$IN_VERSION'"; exit 1; }
            echo "tag=$IN_VERSION" >> "$GITHUB_OUTPUT"; echo "released=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          bump="${IN_BUMP:-}"
          if [ -z "$bump" ]; then
            if git rev-parse -q --verify "refs/tags/${latest}" >/dev/null 2>&1; then
              range="${latest}..HEAD"
            else
              range="HEAD"
            fi
            log="$(git log --format='%s%n%b' ${range})"
            if echo "$log" | grep -qiE '^BREAKING[ -]CHANGE' || echo "$log" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              bump=major
            elif echo "$log" | grep -qE '^feat(\(.+\))?:'; then
              bump=minor
            elif echo "$log" | grep -qE '^(fix|perf)(\(.+\))?:'; then
              bump=patch
            fi
          fi

          if [ -z "$bump" ]; then
            echo "No releasable commits since ${latest} — skipping release."
            echo "released=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          case "$bump" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          tag="v${MA}.${MI}.${PA}"
          echo "Releasing ${tag} (bump=${bump}, since ${latest})"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"; echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Create tag + GitHub Release
        if: steps.ver.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.ver.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes

  build-and-upload:
    name: cross-build release binary
    needs: tag-release
    if: needs.tag-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.tag-release.outputs.tag }}
    steps:
      # Reclaim ~30GB so the JetPack base image + L4T sysroot fit on a hosted
      # runner (else ENOSPC). Self-hosted runner needed if this still fails.
      - name: Free up disk space (host)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout (with proto submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: cmake release preset + build
        uses: devcontainers/ci@v0.3
        with:
          # Build the devcontainer locally — no ghcr imageName/cacheFrom (needs
          # registry login + push perms; was failing at `docker tag ghcr.io/...`).
          # Deferred caching optimization.
          runCmd: |
            set -euo pipefail
            cmake --preset release
            cmake --build --preset release
            file build/release/bin/sst_cam_firmware
            test -x build/release/bin/sst_cam_firmware

      - name: Stage versioned asset
        id: asset
        run: |
          set -euo pipefail
          asset="sst_cam_firmware-${TAG}-aarch64"
          cp build/release/bin/sst_cam_firmware "${asset}"
          echo "path=${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true
